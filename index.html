<p><strong>PARÁGRAFO ÚNICO:</strong> No dia do evento descrito na <strong>CLÁUSULA SEGUNDA</strong>, a <strong>CONTRATADA</strong> e sua equipe iniciarão e encerrarão a prestação do serviço em conformidade ao tempo descrito na <strong>CLÁUSULA QUARTA</strong> do instrumento contratual.</p>

<p><strong>CLÁUSULA NONA:</strong> O(A) <strong>CONTRATANTE</strong> se compromete a fornecer à <strong>CONTRATADA</strong> todas as informações necessárias à realização do serviço de Assessoria e Cerimonial, devendo disponibilizar todos os detalhes necessários para que haja a prestação do serviço da <strong>CONTRATADA</strong>.</p>
<p><strong>PARÁGRAFO PRIMEIRO:</strong> O(A) <strong>CONTRATANTE</strong> concorda em utilizar a Plataforma Assessoria Vip – www.assessoriavip.com.br disponibilizada pela <strong>CONTRATADA</strong>, se comprometendo a fazer o cadastro através de Login e Senha pessoal, cumprir com os prazos e orientações disponibilizados, assinar documentos utilizando o acesso pessoal através de assinatura virtual, bem como comprometendo-se em incluir no sistema todas as informações disponíveis nos campos da Plataforma, anexando, inclusive, todos os contratos com fornecedores e orçamentos.</p>
<p><strong>PARÁGRAFO SEGUNDO:</strong> A <strong>CONTRATADA</strong> não se responsabilizará por qualquer situação diversa vivenciada pelo(a) <strong>CONTRATANTE</strong> proveniente de ausência de informação do(a) <strong>CONTRATANTE</strong> e seus fornecedores para a <strong>CONTRATADA</strong>.</p>

<h3>DA ALTERAÇÃO DA DATA DO EVENTO</h3>
<p><strong>CLÁUSULA DÉCIMA PRIMEIRA:</strong> Na necessidade de adiamento da data do evento descrita na <strong>CLÁUSULA SEGUNDA</strong> do presente instrumento contratual, o(a) <strong>CONTRATANTE</strong> deverá informar a <strong>CONTRATADA</strong> com antecedência mínima de 01 (um) mês da data do evento.</p>
<p><strong>PARÁGRAFO PRIMEIRO:</strong> Caso o(a) <strong>CONTRATANTE</strong> necessite realizar o adiamento da data do evento descrita na <strong>CLÁUSULA SEGUNDA</strong> do presente instrumento contratual em razão de caso fortuito, força maior, ou qualquer medida restritiva proveniente da Pandemia do <strong>COVID-19</strong>, o valor do presente contrato especificado na <strong>CLÁUSULA SEXTA</strong> sofrerá aplicação de juros mensal no importe de 1% (um por cento), devendo ser calculada a diferença financeira tomando como base o intervalo de tempo correspondente a data do evento descrita na <strong>CLÁUSULA SEGUNDA</strong> e a nova data apresentada, comprometendo-se o(a) <strong>CONTRATANTE</strong> em realizar o pagamento da diferença financeira no prazo de até 60 (sessenta) dias, a contar da solicitação de adiamento.</p>
<p><strong>PARÁGRAFO SEGUNDO:</strong> Caso o(a) <strong>CONTRATANTE</strong> necessite realizar o adiamento da data do evento descrita na <strong>CLÁUSULA SEGUNDA</strong> do presente instrumento contratual por sua vontade, ficará obrigado a pagar, de forma imediata, um acréscimo de 20% (vinte por cento) sobre o valor do contrato especificado na <strong>CLÁUSULA SEXTA</strong>, além da quantia correspondente a aplicação de juros mensal no importe de 1% (um por cento), devendo ser calculada a diferença financeira tomando como base o intervalo de tempo correspondente a data do evento descrita na <strong>CLÁUSULA SEGUNDA</strong> e a nova data apresentada.</p>
<p><strong>PARÁGRAFO TERCEIRO:</strong> Caso o(a) <strong>CONTRATANTE</strong> necessite antecipar a data do evento descrita na <strong>CLÁUSULA SEGUNDA</strong> do presente instrumento contratual em razão de caso fortuito, força maior, ou qualquer medida restritiva proveniente da Pandemia do <strong>COVID-19</strong>, o valor do presente contrato especificado na <strong>CLÁUSULA SEXTA</strong> não sofrerá acréscimo.</p>
<p><strong>PARÁGRAFO QUARTO:</strong> Caso o(a) <strong>CONTRATANTE</strong> necessite antecipar a data do evento descrita na <strong>CLÁUSULA SEGUNDA</strong> do presente instrumento contratual por sua vontade, ficará obrigado a pagar, de forma imediata, um acréscimo de 20% (vinte por cento) sobre o valor do contrato especificado na <strong>CLÁUSULA SEXTA</strong>.</p>
<p><strong>CLÁUSULA DÉCIMA SEGUNDA:</strong> O(A) <strong>CONTRATANTE</strong> declara possuir ciência de que a <strong>CONTRATADA</strong>, quando comunicada da necessidade de mudança da data do evento descrita na <strong>CLÁUSULA SEGUNDA</strong> do presente instrumento contratual, verificará a sua disponibilidade para a prestação do serviço de Assessoria e Cerimonial na nova data, no intuito de impedir que haja conflito com outro compromisso profissional e/ou pessoal.</p>
<p><strong>PARÁGRAFO ÚNICO:</strong> Caso a <strong>CONTRATADA</strong> possua compromisso na nova data apresentada, o(a) <strong>CONTRATANTE</strong> poderá optar por apresentar outra data para que a <strong>CONTRATADA</strong> verifique a sua disponibilidade ou optar pela rescisão contratual, sendo que nesta última opção deverá arcará com a multa contratual prevista na <strong>CLÁUSULA DÉCIMA TERCEIRA</strong>.</p>
<h3>DA RESCISÃO CONTRATUAL</h3>
<p><strong>CLÁUSULA DÉCIMA TERCEIRA:</strong> Os contratantes pactuam que a ausência de cumprimento de quaisquer das obrigações previstas no presente instrumento contratual ensejará na rescisão contratual e na aplicação da multa no importe de 20% (vinte por cento) sobre o valor do contrato especificado na <strong>CLÁUSULA SEXTA</strong>.</p>
<p><strong>PARÁGRAFO PRIMEIRO:</strong> Caso haja a aplicação do previsto no caput por culpa do(a) <strong>CONTRATANTE</strong>, este obriga-se a pagar a <strong>CONTRATADA</strong> o valor integral correspondente a multa pactuada, além do valor proporcional correspondente ao tempo dispendido pela <strong>CONTRATADA</strong>, autorizando que haja a compensação de eventuais valores já recebidos pela <strong>CONTRATADA</strong>.</p>
<p><strong>PARÁGRAFO SEGUNDO:</strong> Caso haja a aplicação do previsto no caput por culpa da <strong>CONTRATADA</strong>, esta obriga-se a pagar ao(a) <strong>CONTRATANTE</strong> o valor integral correspondente a multa pactuada, além da devolução de eventuais valores recebidos do(a) <strong>CONTRATANTE</strong>, o qual será realizado da mesma forma prevista na <strong>CLÁUSULA SEXTA</strong>, ou seja, integralmente no ato da rescisão contratual ou na mesma quantidade de parcelas prevista na referida cláusula.</p>
<p><strong>CLÁUSULA DÉCIMA QUARTA:</strong> A <strong>CONTRATADA</strong> ficará eximida de pagar a multa contratual prevista na <strong>CLÁUSULA DÉCIMA TERCEIRA</strong> do presente instrumento contratual caso a não prestação do serviço ou falha na prestação do serviço ocorra em razão de fatos alheios à sua vontade, no que se inclui caso fortuito e/ou de força maior e/ou proveniente da Pandemia do <strong>COVID-19</strong>.</p>

<p><strong>CLÁUSULA DÉCIMA OITAVA:</strong> A <strong>CONTRATADA</strong> não se responsabilizará por perdas e danos praticadas pelo(a) <strong>CONTRATANTE</strong>, convidados do(a) <strong>CONTRATANTE</strong>, fornecedores ou quaisquer terceiros que sejam estranhos a <strong>CONTRATADA</strong> e sua equipe.</p>
<p><strong>CLÁUSULA DÉCIMA NONA:</strong> O(A) <strong>CONTRATANTE</strong> autoriza a <strong>CONTRATADA</strong> a utilizar imagens do evento em seu material promocional, tais como mídia impressa, site, blog, cartões postais, redes sociais, anúncios em revistas especializadas, mídia eletrônica, dentre outros, sem que enseje qualquer ônus a <strong>CONTRATADA</strong>.</p>
<p><strong>CLÁUSULA VIGÉSIMA:</strong> O(A) <strong>CONTRATANTE</strong> declara possuir ciência de que não poderá realizar cessão ou transferência do presente contrato, salvo por autorização da <strong>CONTRATADA</strong>.</p>
